<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bing Rewards Auto - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="brand">
                <div class="brand-icon">⚡</div>
                <div class="brand-text">
                    <h1>Bing Rewards Auto</h1>
                    <p>Cyber-CDP Dashboard</p>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="total-profiles">0</div>
                    <div class="stat-label">Profiles</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="active-profiles">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="status-badge connected" id="connection-status">
                    <span class="status-dot"></span>
                    <span>Connected</span>
                </div>
            </div>
        </header>

        <!-- Control Panel -->
        <div class="control-panel glass-panel">
            <div class="controls-grid">
                <!-- Search Controls -->
                <button class="btn" id="btn-refresh">
                    🔍 Scan
                </button>
                <div class="divider"></div>
                <label style="display:flex; align-items:center; gap:6px; color:var(--text-muted); font-size:13px; margin-right:8px; cursor:pointer; font-weight:600;">
                    <input type="checkbox" id="cb-select-all" checked> SELECT ALL
                </label>
                <button class="btn btn-primary" id="btn-start-all">
                    ▶️ START SELECTED
                </button>
                <button class="btn btn-danger" id="btn-stop-all">
                    ⏹️ STOP SELECTED
                </button>
                <div class="divider"></div>
                <!-- Task & Utility Controls -->
                <button class="btn" id="btn-daily-tasks">
                    📋 DAILY TASKS
                </button>
                <button class="btn" id="btn-check-points">
                    ⭐ CHECK PTS
                </button>
                <button class="btn" id="btn-reset-page">
                    🌐 RESET TABS
                </button>
                <button class="btn" id="btn-reset-all">
                    🔄 REFRESH
                </button>
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div class="dashboard-grid">
            <!-- Main Content -->
            <div class="main-content glass-panel" style="padding: 20px;">
                <div class="section-title">
                    <span>Active Profiles</span>
                </div>
                <div class="profile-grid" id="profile-container">
                    <div class="empty-state">
                        <p>No profiles detected. Open GenLogin browsers first.</p>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Settings Panel -->
                <div class="panel glass-panel">
                    <div class="panel-header">
                        Configuration
                        <button class="btn-clear" id="btn-settings">Save</button>
                    </div>
                    <div class="panel-body">
                        <div class="form-group">
                            <label class="form-label">Rewards Level</label>
                            <select class="form-select" id="cfg-level">
                                <option value="member">Member (Lvl 1 - Max 3)</option>
                                <option value="silver">Silver (Lvl 2 - Max 6)</option>
                                <option value="gold" selected>Gold (Lvl 2+ - Max 12)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">PC Search Count</label>
                            <input type="number" class="form-input" id="cfg-search" value="12" min="1" max="100">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Min Delay (s)</label>
                                <input type="number" class="form-input" id="cfg-min-delay" value="20" min="5" max="120">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Max Delay (s)</label>
                                <input type="number" class="form-input" id="cfg-max-delay" value="40" min="5" max="180">
                            </div>
                        </div>
                        <div class="toggle-group">
                            <span class="form-label" style="color:var(--text-main);">Mobile Mode</span>
                            <label class="switch">
                                <input type="checkbox" id="cfg-mobile">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Logs Panel -->
                <div class="panel glass-panel" style="flex: 1;">
                    <div class="panel-header">
                        Terminal Output
                        <button class="btn-clear" onclick="clearLogs()">Clear</button>
                    </div>
                    <div class="panel-body" style="padding: 0;">
                        <div class="log-window" id="log-window" style="background:transparent; border:none; height:100%;">
                            <!-- Logs will be inserted here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
